; PlaydateTimer external resources config
; Display area remains exactly 400x240. The black border is outside this area.
[fonts]
; Use the Windows font family name here, not necessarily the filename.
; Example after installing/loading font/Pixel-font/PixelFont.ttf: default=PixelFont
default=font-Cuberick-Bold
time=PixelFont
timer=PixelFont-60

[font_sizes]
; default controls small UI text like "press E", settings labels, and mode titles.
; time controls CLOCK mode HH:MM:SS.
; timer controls WORKTIME/BREAKTIME countdown and DONE/FINISHED alert text.
default=18
time=60
timer=72

[font_weights]
; 400 = normal, 700 = bold. You can also try 500/600/800/900 if the font supports it.
default=700
time=400
timer=400

[font_italic]
; 0 = normal, 1 = italic.
default=0
time=0
timer=0

[font_quality]
; 3 = non-antialiased/pixel-like, 5 = ClearType, 0 = Windows default.
default=3
time=3
timer=3

[sound]
; Put your prompt sound at sounds\prompt_tone.wav, or change this path.
prompt=sounds\prompt_tone.wav

[window]
; 1 = keep the app always on top, 0 = normal window stacking.
always_on_top=1
; 255 = fully opaque. 200 is about 78% opacity when inactive.
active_alpha=255
inactive_alpha=180

[icon]
; Runtime taskbar/window icon. Replace icon\app.ico with your own .ico file.
path=icon\app.ico
